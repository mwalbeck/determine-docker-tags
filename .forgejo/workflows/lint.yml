name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: debian-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run checks
        run: |
          poetry install --with dev
          poetry run ruff check determine_docker_tags
          poetry run pytest

  docker:
    runs-on: dind
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get docker tags
        id: tags
        shell: sh
        env:
          CUSTOM_TAGS: ${{ forgejo.SHA }}
          IMAGE_NAME: "git.walbeck.it/walbeck-it/determine-docker-tags"
        run: |
          determine-docker-tags
          dockerd &

      - name: Set up Docker Buildx
        uses: actions/docker-setup-buildx@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push
        uses: actions/docker-build-push@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          tags: ${{ steps.tags.outputs.tags }}